<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Admission Form</title>

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:600px;
padding:35px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h2{
color:#007bff;
margin-bottom:5px;
}

.header p{
color:#666;
font-size:14px;
}

.section{
margin-bottom:20px;
}

.section h3{
font-size:16px;
margin-bottom:10px;
color:#444;
border-left:4px solid #007bff;
padding-left:8px;
}

.form-group{
margin-bottom:12px;
display:flex;
flex-direction:column;
}

.form-group label{
font-size:14px;
font-weight:600;
margin-bottom:4px;
}

.form-group input,
.form-group select,
.form-group textarea{
padding:9px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
border-color:#007bff;
outline:none;
}

.row{
display:flex;
gap:10px;
}

.row .form-group{
flex:1;
}

button{
margin-top:15px;
padding:12px;
background:#28a745;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#218838;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Admission Application</h2>
<p>Rajasthan Technical University Kota | Session 2026-27</p>
</div>

<form action="Servlet" method="post">

<div class="section">
<h3>Personal Details</h3>

<div class="row">

<div class="form-group">
<label>Full Name</label>
<input type="text" name="fullname" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" name="phone" required>
</div>

</div>

<div class="form-group">
<label>Address</label>
<textarea name="address" rows="2"></textarea>
</div>

</div>

<div class="section">

<h3>Academic Details</h3>

<div class="form-group">
<label>Course</label>
<select name="course">
<option value="">Select Course</option>
<option value="BCA">BCA</option>
<option value="MCA">MCA</option>
<option value="BBA">BBA</option>
<option value="MBA">MBA</option>
</select>
</div>

<div class="row">

<div class="form-group">
<label>10th Marks (%)</label>
<input type="number" name="marks10">
</div>

<div class="form-group">
<label>12th Marks (%)</label>
<input type="number" name="marks12">
</div>

</div>

</div>

<button type="submit">Submit Application</button>

</form>

</div>

</body>
</html>
